# =============================================================================
# Backtesting Framework Configuration
# =============================================================================
# This config supports multi-instrument, multi-strategy analysis.
# Uncomment and modify the template sections below for your use case.
# =============================================================================

api:
  api_key: "your api_key"
  api_secret: "your api_secret"
  access_token: "your access_token"
  # NIFTY 50 instrument token for Kite Connect
  instrument_token: 256265
  exchange: "NSE"
  tradingsymbol: "NIFTY 50"

# ── Instrument Configuration ─────────────────────────────────────────────────
# Defines WHAT you are trading/analyzing.
# type: equity | index | futures | options | mutual_fund
instrument:
  type: "index"
  symbol: "NIFTY 50"
  instrument_token: 256265
  exchange: "NSE"
  timeframe: "minute"         # minute | day
  # expiry: "2026-03-26"      # For F&O only
  # strike: 22000              # For options only
  # option_type: "CE"          # CE | PE (for options only)

# ── Analysis Mode ────────────────────────────────────────────────────────────
analysis:
  mode: "backtest"             # backtest | analysis

# ── Data Settings ────────────────────────────────────────────────────────────
data:
  years: 10
  interval: "minute"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  enable_cache: true
  cache_expiry_hours: 24

# ── Strategy Configuration ───────────────────────────────────────────────────
# name: must match a key in STRATEGY_REGISTRY (run --list-strategies to see all)
# params: strategy-specific parameters (optional overrides)
strategy:
  name: "btst_supertrend_breakout"
  params:
    supertrend_period: 10
    supertrend_multiplier: 2.0

# ── Backtest Execution Parameters ────────────────────────────────────────────
backtest:
  initial_capital: 1000000.0
  slippage: 0.5
  brokerage: 20.0
  lot_size: 50

# ── Output Settings ──────────────────────────────────────────────────────────
output:
  base_dir: "outputs"
  save_trades_csv: true
  save_metrics_json: true
  save_metrics_csv: true
  save_plots_html: true

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level: "INFO"
  log_to_file: true
  log_dir: "outputs"


